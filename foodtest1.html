  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7327562206502398" crossorigin="anonymous"></script>

    crossorigin="anonymous"></script>
  <script src="tests/foodtest1/food-test.js"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --c-main:    #1c1917;
      --c-accent:  #e85d75;
      --c-bg:      #faf8f5;
      --c-surface: #ffffff;
      --c-surf2:   #f3f0ea;
      --c-text:    #1c1917;
      --c-muted:   #9b9490;
      --c-border:  #e8e3db;
      --shadow:        0 2px 16px rgba(0,0,0,.06);
      --shadow-hover:  0 12px 40px rgba(0,0,0,.13);
      --r:   20px;
      --r-sm: 14px;
    }
    [data-theme="dark"] {
      --c-main:    #f0ece6;
      --c-accent:  #ff4d72;
      --c-bg:      #100f0e;
      --c-surface: #1a1917;
      --c-surf2:   #211f1d;
      --c-text:    #f0ece6;
      --c-muted:   #605c58;
      --c-border:  #2a2724;
      --shadow:        0 2px 16px rgba(0,0,0,.4);
      --shadow-hover:  0 12px 40px rgba(0,0,0,.6);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background .35s, color .35s;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }

    /* ── Progress Bar ────────────────────────────────── */
    #progressTrack {
      position: fixed; top: 0; left: 0; right: 0; height: 3px;
      background: var(--c-border); z-index: 200; transition: background .35s;
    }
    #progressFill {
      height: 100%; background: var(--c-accent);
      border-radius: 0 3px 3px 0;
      transition: width .55s cubic-bezier(.22,1,.36,1); width: 0%;
    }

    /* ── Top Nav ─────────────────────────────────────── */
    #topNav {
      position: fixed;
      top: max(10px, env(safe-area-inset-top)); left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 18px; z-index: 150;
    }
    .nav-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--c-surface); border: 1.5px solid var(--c-border);
      display: grid; place-items: center; font-size: 16px;
      transition: border-color .2s, transform .2s, background .35s;
    }
    .nav-btn:hover { border-color: var(--c-accent); }
    #themeBtn:hover { transform: rotate(22deg); }

    /* ── Screens ─────────────────────────────────────── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--c-main); color: var(--c-bg);
      font-size: 13px; font-weight: 500;
      padding: 12px 24px; border-radius: 100px;
      opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Keyframes ───────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bumpIn {
      from { opacity: 0; transform: scale(.45); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .35; }
    }

    /* ═══════════════════════════════════════════════
       INTRO SCREEN
    ═══════════════════════════════════════════════ */
    #introScreen {
      align-items: center; justify-content: center;
      padding: 80px 24px 48px; text-align: center;
      animation: fadeIn .6s ease both;
    }
    .intro-thumb {
      width: 100%; max-width: 300px;
      border-radius: 20px; object-fit: cover;
      aspect-ratio: 4/3; margin-bottom: 24px;
      box-shadow: var(--shadow-hover);
      animation: bumpIn .7s .1s cubic-bezier(.34,1.56,.64,1) both;
    }
    .intro-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 26px; letter-spacing: -.5px; line-height: 1.3;
      margin-bottom: 12px;
    }
    .intro-sub {
      font-size: 14px; font-weight: 300; color: var(--c-muted);
      line-height: 1.7; margin-bottom: 36px;
    }
    .intro-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 40px;
    }
    .meta-pill {
      font-size: 12px; font-weight: 500; color: var(--c-muted);
      background: var(--c-surf2); padding: 6px 14px; border-radius: 100px;
    }
    .start-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--c-main); color: var(--c-bg);
      font-family: 'Nanum Myeongjo', serif; font-size: 18px;
      padding: 18px 52px; border-radius: 100px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .intro-share-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #FEE500; color: #1c1917;
      font-family: 'Nanum Myeongjo', serif; font-size: 16px;
      padding: 14px 36px; border-radius: 100px; margin-top: 14px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .intro-share-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .intro-ad { width: 100%; max-width: 380px; margin-top: 32px; }

    /* ═══════════════════════════════════════════════
       QUIZ SCREEN — 질문 + 사사분면 이미지 그리드
    ═══════════════════════════════════════════════ */
    #quizScreen {
      max-width: 480px; margin: 0 auto; width: 100%;
      padding: 0; min-height: 100vh;
      flex-direction: column;
    }

    /* 질문 텍스트 영역 */
    #questionArea {
      padding: 72px 24px 16px;
      text-align: center;
      animation: fadeIn .5s ease both;
    }
    .q-subtitle {
      font-size: 12px; font-weight: 500; letter-spacing: 1.5px;
      color: var(--c-accent); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .q-text {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 22px; letter-spacing: -.4px; line-height: 1.55;
      white-space: pre-line;
    }
    .q-hint {
      font-size: 13px; color: var(--c-muted); margin-top: 8px;
      font-weight: 300;
    }

    /* 사사분면 이미지 그리드 */
    #foodGrid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-content: start;
      gap: 8px;
      padding: 8px 12px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      animation: fadeIn .5s .15s ease both;
    }

    .food-cell {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      border: 2.5px solid transparent;
      transition:
        transform .28s cubic-bezier(.34,1.56,.64,1),
        border-color .22s,
        box-shadow .25s;
      -webkit-tap-highlight-color: transparent;
    }
    .food-cell:hover {
      transform: scale(1.03);
      box-shadow: var(--shadow-hover);
    }
    .food-cell:active {
      transform: scale(0.97);
    }
    .food-cell.selected {
      border-color: var(--c-accent);
      box-shadow: 0 0 0 4px rgba(232,93,117,.25);
    }
    .food-cell.disabled {
      cursor: default;
      opacity: 0.65;
    }
    .food-cell.disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .food-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
    }
    .food-cell:hover .food-img { transform: scale(1.06); }
    .food-cell.selected .food-img { transform: scale(1.06); }

    /* 라벨 오버레이 */
    .food-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .food-name {
      font-size: 14px; font-weight: 700; color: #fff;
      letter-spacing: -.2px;
    }
    .food-emoji-label {
      font-size: 18px; line-height: 1;
    }

    /* 선택 체크 오버레이 */
    .food-check {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--c-accent);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 700; color: #fff;
      opacity: 0;
      transform: scale(0) rotate(-90deg);
      transition: opacity .22s, transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .food-cell.selected .food-check {
      opacity: 1; transform: scale(1) rotate(0deg);
    }

    /* ═══════════════════════════════════════════════
       LOADING SCREEN
    ═══════════════════════════════════════════════ */
    #loadingScreen {
      align-items: center; justify-content: center;
      text-align: center; gap: 28px;
    }
    .loading-spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 3px solid var(--c-border);
      border-top-color: var(--c-accent);
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 20px; letter-spacing: -.3px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-dots span {
      display: inline-block;
      animation: dotBounce .8s ease-in-out infinite;
      font-size: 22px; color: var(--c-accent);
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes dotBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ═══════════════════════════════════════════════
       RESULT SCREEN
    ═══════════════════════════════════════════════ */
    #resultScreen {
      align-items: center;
      padding: 80px 20px 64px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }
    .result-kicker {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--c-accent); margin-bottom: 16px;
      opacity: 0; animation: fadeIn .5s .1s ease both;
    }
    .result-type {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 28px; letter-spacing: -.5px; line-height: 1.3;
      margin-bottom: 12px; text-align: center;
      opacity: 0; animation: fadeIn .5s .5s ease both;
    }
    .result-tagline {
      font-size: 14px; font-weight: 300; color: var(--c-muted);
      font-style: italic; text-align: center; margin-bottom: 32px;
      opacity: 0; animation: fadeIn .5s .7s ease both;
    }
    .result-divider {
      width: 36px; height: 2px;
      background: var(--c-border); border-radius: 2px;
      margin: 0 auto 28px;
      opacity: 0; animation: fadeIn .5s .7s ease both;
    }

    /* 성격 카드 */
    .personality-cards {
      width: 100%; margin-bottom: 32px;
      opacity: 0; animation: slideUp .6s .9s ease both;
    }
    .personality-card {
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-sm);
      padding: 18px 18px 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      transition: background .35s, border-color .35s;
    }
    .personality-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--result-color, var(--c-accent));
      border-radius: 0 2px 2px 0;
    }
    .personality-card-title {
      font-size: 14px; font-weight: 700;
      margin-bottom: 8px; padding-left: 4px;
    }
    .personality-card-desc {
      font-size: 13px; font-weight: 300; color: var(--c-muted);
      line-height: 1.8; padding-left: 4px;
    }

    /* 공유 카드 */
    .share-card-preview {
      width: 100%; max-width: 280px; margin-bottom: 24px;
      opacity: 0; animation: fadeIn .6s .3s ease both;
    }
    .share-thumb-placeholder {
      width: 100%; aspect-ratio: 340/480;
      border-radius: 24px; background: var(--c-surf2);
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* 액션 버튼 */
    .action-btns {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 320px;
      opacity: 0; animation: slideUp .5s 1.3s ease both;
    }
    .action-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 16px 20px; border-radius: var(--r-sm);
      font-size: 15px; font-weight: 500;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      text-decoration: none;
    }
    .action-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .btn-retry { background: var(--c-surf2); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-kakao { background: #FEE500; color: #1c1917; }
    .btn-copy  { background: var(--c-surface); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-share { background: var(--c-surface); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-more  { background: var(--c-main); color: var(--c-bg); }
    .btn-icon  { font-size: 19px; }

    /* ── Instagram-style share card (off-screen) */
    #shareCard {
      position: fixed; left: -9999px; top: 0;
      width: 340px; height: 480px;
      background: #1c1917; border-radius: 28px; overflow: hidden;
      display: flex; flex-direction: column; padding: 20px 24px 20px;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .sc-blobs { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .sc-blob { position: absolute; border-radius: 50%; }
    .sc-blob-1 { width: 220px; height: 220px; top: -80px; right: -70px; background: #e85d75; opacity: .18; }
    .sc-blob-2 { width: 160px; height: 160px; bottom: -60px; left: -40px; background: #e85d75; opacity: .10; }
    .sc-blob-3 { width: 80px;  height: 80px;  top: 40%;    left: -20px; background: #ff9a3c; opacity: .12; }
    .sc-inner {
      position: relative; flex: 1;
      display: flex; flex-direction: column; gap: 14px;
    }
    .sc-header { display: flex; justify-content: space-between; align-items: center; }
    .sc-logo { font-family: 'Nanum Myeongjo', serif; font-size: 17px; color: #faf8f5; letter-spacing: -1px; }
    .sc-logo-dot { color: #e85d75; }
    .sc-center {
      display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 10px;
    }
    .sc-tag {
      display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: #e85d75; background: rgba(232,93,117,.14);
      padding: 5px 12px; border-radius: 100px;
    }
    .sc-food-img {
      width: 100%; height: auto;
      border-radius: 16px;
      object-fit: cover; display: block;
    }
    .sc-label { font-size: 11px; font-weight: 500; color: rgba(250,248,245,.45); letter-spacing: .3px; }
    .sc-type {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 22px; color: #faf8f5; letter-spacing: -.5px; line-height: 1.3;
    }
    .sc-divider { width: 30px; height: 1.5px; background: rgba(250,248,245,.18); margin: 0 auto 6px; }
    .sc-desc { font-size: 11.5px; color: rgba(250,248,245,.5); line-height: 1.7; font-weight: 300; max-width: 240px; }
    .sc-footer { position: relative; font-size: 10px; color: rgba(250,248,245,.25); font-weight: 500; letter-spacing: .5px; text-align: center; }
    #shareThumb { width: 100%; border-radius: 16px; box-shadow: var(--shadow-hover); display: block; }

    /* ── Share Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 2000; display: none; align-items: flex-end; justify-content: center;
      opacity: 0; transition: opacity .3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .share-modal {
      background: var(--c-surface); width: 100%; max-width: 480px;
      border-radius: 24px 24px 0 0; padding: 24px 20px 40px;
      transform: translateY(100%); transition: transform .3s cubic-bezier(0.2,0.8,0.2,1);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
    }
    .modal-overlay.active .share-modal { transform: translateY(0); }
    .share-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .share-modal-title { font-weight: 700; font-size: 18px; }
    .share-modal-close { font-size: 24px; color: var(--c-muted); padding: 4px; }
    .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .share-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; color: var(--c-text); font-weight: 500; }
    .share-icon-btn {
      width: 52px; height: 52px; border-radius: 16px;
      display: grid; place-items: center; font-size: 24px;
      background: var(--c-surf2); transition: transform .2s, background .2s;
    }
    .share-icon-btn:active { transform: scale(0.92); background: var(--c-border); }
    .share-icon-btn.x { background: #000; color: #fff; }
    .share-icon-btn.threads { background: #000; color: #fff; }
    .share-icon-btn.facebook { background: #1877F2; color: #fff; }
    .share-icon-btn.copy { background: var(--c-accent); color: #fff; }
  </style>
</head>
<body>

<div id="progressTrack"><div id="progressFill"></div></div>

<div id="topNav">
  <button class="nav-btn" aria-label="뒤로가기" onclick="history.length > 1 ? history.back() : location.href='index.html'">←</button>
  <span></span>
  <button class="nav-btn" id="themeBtn" aria-label="테마 전환">🌙</button>
</div>

<!-- ① 인트로 -->
<div class="screen active" id="introScreen">
  <img class="intro-thumb" src="images/foodtest1/thumb.webp" alt="음식 심리테스트" />
  <h1 class="intro-title">음식으로 보는<br>나의 현재 심리 상태</h1>

        <span>Facebook</span>

<div id="toast"></div>

<script>
/* ── Theme ── */
(function() {
  const saved = localStorage.getItem('theme');
  const pref  = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.dataset.theme = saved || pref;
  document.getElementById('themeBtn').textContent = (saved || pref) === 'dark' ? '☀️' : '🌙';
})();

document.getElementById('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', next);
});

/* ── State ── */
let selectedFood = null;

/* ── Screen helpers ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── Intro ── */
document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('introShareBtn').addEventListener('click', shareIntro);
document.getElementById('viewResultBtn').addEventListener('click', () => showResult(selectedFood));

/* ── 퀴즈 시작 ── */
function startQuiz() {
  showScreen('quizScreen');
  renderFoodGrid();
  (function tryIncrement(n) {
    if (window.incrementParticipation) {
      window.incrementParticipation('foodtest1');
    } else if (n > 0) {
      setTimeout(() => tryIncrement(n - 1), 200);
    }
  })(15);
}

/* ── 사사분면 이미지 그리드 렌더링 ──
   시계방향: TL(0), TR(1), BR(2), BL(3)
   CSS 그리드 읽기 순서: TL, TR, BL, BR
   → 그리드 순서: choices[0], choices[1], choices[3], choices[2]
*/
function renderFoodGrid() {
  const q = FOOD_QUESTION;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('qHint').textContent = q.subtitle;

  const grid = document.getElementById('foodGrid');
  const choices = q.choices; // [PIZZA, RAMEN, CHICKEN, ICECREAM]

  // 그리드 순서: TL=0(PIZZA), TR=1(RAMEN), BL=3(ICECREAM), BR=2(CHICKEN)
  const gridOrder = [0, 1, 3, 2];

  grid.innerHTML = gridOrder.map((ci) => {
    const c = choices[ci];
    return `
      <div class="food-cell" data-id="${c.id}" data-img-index="${ci}">
        <img class="food-img"
             src="images/foodtest1/${ci}.webp"
             alt="${c.label}"
             loading="lazy" />
        <div class="food-label">
          <span class="food-name">${c.label}</span>
          <span class="food-emoji-label">${c.emoji}</span>
        </div>
        <div class="food-check">✓</div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.food-cell').forEach(cell => {
    cell.addEventListener('click', () => onFoodSelect(cell));
  });
}

function onFoodSelect(cell) {
  if (selectedFood) return;
  selectedFood = cell.dataset.id;

  cell.classList.add('selected');
  document.querySelectorAll('.food-cell').forEach(c => c.classList.add('disabled'));
  document.getElementById('progressFill').style.width = '100%';

  setTimeout(() => {
    // 로딩 화면 초기 상태로 리셋
    document.getElementById('loadingSpinner').style.display = '';
    document.getElementById('loadingInfo').style.display = '';
    document.getElementById('viewResultBtn').style.display = 'none';

    showScreen('loadingScreen');

    // 2200ms 후 스피너 숨기고 결과 확인 버튼 표시
    setTimeout(() => {
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('loadingInfo').style.display = 'none';
      document.getElementById('viewResultBtn').style.display = 'inline-flex';
    }, 2200);
  }, 500);
}

/* ── 결과 ── */
function showResult(foodId) {
  const res = FOOD_TYPES[foodId];
  if (!res) return;

  const imgIndex = FOOD_QUESTION.choices.findIndex(c => c.id === foodId);

  // 공유카드 채우기
  const scFoodImg = document.getElementById('scFoodImg');
  scFoodImg.src = `images/foodtest1/${imgIndex}.webp`;
  document.getElementById('scType').textContent = res.name;
  document.getElementById('scDesc').textContent = res.tagline;

  const typeEl = document.getElementById('resultType');
  typeEl.textContent = '';

  document.getElementById('resultTagline').textContent = res.tagline;

  // 성격 카드
  const cards = document.getElementById('personalityCards');
  cards.innerHTML = res.personality.map(p => `
    <div class="personality-card" style="--result-color: ${res.color}">
      <div class="personality-card-title">${p.title}</div>
      <div class="personality-card-desc">${p.desc}</div>
    </div>
  `).join('');

  // 결과 타입명 타이핑 효과
  showScreen('resultScreen');

  try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(_) {}

  const chars = res.name.split('');
  setTimeout(() => {
    let i = 0;
    const iv = setInterval(() => {
      typeEl.textContent += chars[i++];
      if (i >= chars.length) clearInterval(iv);
    }, 75);
  }, 400);

  // 세션 저장 (공유용)
  sessionStorage.setItem('foodResult_type',  res.name);
  sessionStorage.setItem('foodResult_emoji', res.emoji);
  sessionStorage.setItem('foodResult_food',  res.food);
  sessionStorage.setItem('foodResult_imgIndex', imgIndex);

  // 썸네일 생성
  setTimeout(generateThumb, 800);
}

/* ── 공유 카드 이미지 생성 ── */
async function generateThumb() {
  if (typeof html2canvas === 'undefined') return;
  try {
    const canvas = await html2canvas(document.getElementById('shareCard'), {
      scale: 1.5, useCORS: true, backgroundColor: null, logging: false,
    });
    const thumb = document.getElementById('shareThumb');
    thumb.src = canvas.toDataURL('image/png');
    thumb.style.display = 'block';
    document.getElementById('shareThumbPlaceholder').style.display = 'none';
  } catch(_) {}
}

/* ── 다시하기 ── */
document.getElementById('btnRetry').addEventListener('click', () => {
  selectedFood = null;
  showScreen('introScreen');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('shareThumb').style.display = 'none';
  document.getElementById('shareThumbPlaceholder').style.display = 'block';
});

/* ── 카카오 공유 ── */
function initKakao() {
  if (typeof Kakao === 'undefined') return false;
  if (!Kakao.isInitialized()) Kakao.init('bbe63bfcba108e48b558a6554e0fd9c1');
  return true;
}

function shareIntro() {
  if (!initKakao()) { showToast('카카오 SDK를 불러오는 중이에요.'); return; }
  const base = 'https://testlab.tmhub.co.kr';
  const url  = `${base}/foodtest1.html`;
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '🍕 음식으로 보는 나의 심리 상태',
      description: '지금 가장 당기는 음식 하나만 골라봐요. 당신의 지금 마음이 보여요.',
      imageUrl: `${base}/images/foodtest1/thumb.webp`,
      link: { mobileWebUrl: url, webUrl: url },
    },
    buttons: [
      { title: '테스트하기', link: { mobileWebUrl: url, webUrl: url } },
      { title: '다른 테스트 보기', link: { mobileWebUrl: `${base}/`, webUrl: `${base}/` } },
    ],
  });
}

document.getElementById('btnKakao').addEventListener('click', () => {
  if (!initKakao()) { showToast('카카오 SDK를 불러오는 중이에요.'); return; }
  const type  = sessionStorage.getItem('foodResult_type')  || '';
  const base  = 'https://testlab.tmhub.co.kr';
  const url   = location.href;
  const imgIdx = sessionStorage.getItem('foodResult_imgIndex') || '0';
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: `🍕 음식 심리 테스트 — ${type}`,
      description: '나의 현재 심리 상태가 당기는 음식에 나타나요. 당신은?',
      imageUrl: `${base}/images/foodtest1/${imgIdx}.webp`,
      link: { mobileWebUrl: `${base}/foodtest1.html`, webUrl: `${base}/foodtest1.html` },
    },
    buttons: [
      { title: '나도 해보기', link: { mobileWebUrl: `${base}/foodtest1.html`, webUrl: `${base}/foodtest1.html` } },
    ],
  });
});

/* ── 링크 복사 ── */
document.getElementById('btnCopy').addEventListener('click', copyLink);
function copyLink() {
  const doToast = () => showToast('링크가 복사됐어요 🎉');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(location.href).then(doToast).catch(fallback);
  } else { fallback(); }
  function fallback() {
    const ta = Object.assign(document.createElement('textarea'), { value: location.href });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    doToast();
  }
}

/* ── 네이티브 공유 / 모달 ── */
document.getElementById('btnShare').addEventListener('click', shareNative);
async function shareNative() {
  const type = sessionStorage.getItem('foodResult_type') || '';
  const text = `🍕 음식 심리 테스트${type ? ` — ${type}` : ''}`;
  if (navigator.share) {
    try { await navigator.share({ title: text, url: location.href }); return; } catch(_) {}
  }
  const overlay = document.getElementById('shareModalOverlay');
  overlay.style.display = 'flex';
  setTimeout(() => overlay.classList.add('active'), 10);
}

function closeShareModal() {
  const overlay = document.getElementById('shareModalOverlay');
  overlay.classList.remove('active');
  setTimeout(() => overlay.style.display = 'none', 300);
}

function shareTo(platform) {
  const type = sessionStorage.getItem('foodResult_type') || '';
  const text = `🍕 음식 심리 테스트${type ? ` — ${type}` : ''}`;
  const url  = location.href;
  const encodedText = encodeURIComponent(`${text}\n${url}`);
  switch(platform) {
    case 'x':       window.open(`https://x.com/intent/post?text=${encodedText}`, '_blank'); break;
    case 'threads': window.open(`https://www.threads.net/intent/post?text=${encodedText}`, '_blank'); break;
    case 'facebook': window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank'); break;
    case 'copy':    copyLink(); break;
  }
  closeShareModal();
}
</script>

<script type="module">
  import { db, doc, updateDoc, increment } from './firebase-init.js';

  window.incrementParticipation = function(id) {
    if (!id) return;
    const statsRef = doc(db, 'stats', 'participation');
    updateDoc(statsRef, {
      [id]: increment(1)
    }).catch(err => {
      console.error('Firebase update failed:', err);
    });
  };
</script>

<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>마음. — 심리테스트</title>

  <meta property="og:image"       content="https://psychological-test-mu.vercel.app/images/sbti/thumb.webp" />

  <!-- ── Twitter Card ──────────────────────────────── -->

  <meta name="twitter:title"       content="마음. — 심리테스트" />

  <meta name="twitter:image"       content="https://psychological-test-mu.vercel.app/images/sbti/thumb.webp" />

  <!-- ── Canonical ─────────────────────────────────── -->
  <link rel="canonical" href="https://psychological-test-mu.vercel.app/test.html" id="canonical" />

  <script type="application/ld+json" id="jsonld">{}</script>

  <!-- ── Fonts ─────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- ── html2canvas ───────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

  <!-- ── Kakao SDK ─────────────────────────────────── -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
    crossorigin="anonymous"></script>
  
  <!-- ── SBTI Data ─────────────────────────────────── -->
  <script src="tests/sbti/questions.js"></script>
  <script src="tests/sbti/type-patterns.js"></script>
  <script src="tests/sbti/dimension-descriptions.js"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --c-main:    #1c1917;
      --c-accent:  #e85d75;
      --c-bg:      #faf8f5;
      --c-surface: #ffffff;
      --c-surf2:   #f3f0ea;
      --c-text:    #1c1917;
      --c-muted:   #9b9490;
      --c-border:  #e8e3db;
      --shadow:        0 2px 16px rgba(0,0,0,.06);
      --shadow-hover:  0 12px 40px rgba(0,0,0,.13);
      --r:   20px;
      --r-sm: 14px;
    }
    [data-theme="dark"] {
      --c-main:    #f0ece6;
      --c-accent:  #ff4d72;
      --c-bg:      #100f0e;
      --c-surface: #1a1917;
      --c-surf2:   #211f1d;
      --c-text:    #f0ece6;
      --c-muted:   #605c58;
      --c-border:  #2a2724;
      --shadow:        0 2px 16px rgba(0,0,0,.4);
      --shadow-hover:  0 12px 40px rgba(0,0,0,.6);
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background .35s, color .35s;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Progress Bar ────────────────────────────────── */
    #progressTrack {
      position: fixed;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--c-border);
      z-index: 200;
      transition: background .35s;
    }
    #progressFill {
      height: 100%;
      background: var(--c-accent);
      border-radius: 0 3px 3px 0;
      transition: width .55s cubic-bezier(.22,1,.36,1);
      width: 0%;
    }

    /* ── Top Nav ─────────────────────────────────────── */
    #topNav {
      position: fixed;
      top: max(10px, env(safe-area-inset-top)); left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px;
      z-index: 150;
    }
    #topNav .q-counter-nav {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.8px; color: var(--c-accent);
      text-transform: uppercase;
      display: none;
    }
    #topNav .q-counter-nav.visible { display: block; }
    .nav-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      display: grid; place-items: center;
      font-size: 16px;
      transition: border-color .2s, transform .2s, background .35s;
    }
    .nav-btn:hover { border-color: var(--c-accent); }
    #themeBtn:hover { transform: rotate(22deg); }

    /* ── Screens ─────────────────────────────────────── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ═══════════════════════════════════════════════
       INTRO SCREEN
    ═══════════════════════════════════════════════ */
    #introScreen {
      align-items: center; justify-content: center;
      padding: 80px 24px 48px;
      text-align: center;
      animation: fadeIn .6s ease both;
    }
    .intro-emoji {
      font-size: 84px; line-height: 1; margin-bottom: 24px;
      animation: bumpIn .7s .1s cubic-bezier(.34,1.56,.64,1) both;
    }
    .intro-thumb {
      width: 100%; max-width: 340px;
      border-radius: 20px;
      object-fit: cover;
      aspect-ratio: 4/3;
      margin-bottom: 24px;
      box-shadow: var(--shadow-hover);
      animation: bumpIn .7s .1s cubic-bezier(.34,1.56,.64,1) both;
    }
    .intro-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 28px; letter-spacing: -.5px; line-height: 1.2;
      margin-bottom: 12px;
    }
    .intro-sub {
      font-size: 14px; font-weight: 300; color: var(--c-muted);
      line-height: 1.7; margin-bottom: 36px;
    }
    .intro-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 52px;
    }
    .meta-pill {
      font-size: 12px; font-weight: 500; color: var(--c-muted);
      background: var(--c-surf2); padding: 6px 14px; border-radius: 100px;
    }
    .start-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--c-main); color: var(--c-bg);
      font-family: 'Nanum Myeongjo', serif; font-size: 18px;
      padding: 18px 52px; border-radius: 100px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .intro-share-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #FEE500; color: #1c1917;
      font-family: 'Nanum Myeongjo', serif; font-size: 16px;
      padding: 14px 36px; border-radius: 100px;
      margin-top: 14px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .intro-share-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

    /* ═══════════════════════════════════════════════
       QUIZ SCREEN — mobile-first: question top, choices bottom
    ═══════════════════════════════════════════════ */
    #quizScreen {
      max-width: 480px; margin: 0 auto; width: 100%;
    }

    /* ── Question area */
    #qArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 64px 24px 0;
      min-height: 0;
    }

    .q-counter { display: none; }

    /* Grid stacking: entering + exiting slides overlap cleanly */
    #slideWrap {
      display: grid;
      grid-template-columns: 1fr;
      flex: 1;
      overflow: hidden;
      align-items: center;
    }
    .q-slide {
      grid-area: 1 / 1;
      padding-bottom: 24px;
    }
    .q-slide.enter-right {
      animation: slideInRight .38s cubic-bezier(.22,1,.36,1) both;
    }
    .q-slide.exit-left {
      animation: slideOutLeft .32s cubic-bezier(.22,1,.36,1) both;
      pointer-events: none;
    }

    .q-img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      margin-bottom: 20px;
    }
    .q-text {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 23px; letter-spacing: -.4px; line-height: 1.5;
    }

    /* ── Choices area (sticky thumb zone at bottom) */
    #choicesArea {
      position: sticky;
      bottom: 0;
      background: var(--c-bg);
      border-top: 1px solid var(--c-border);
      padding: 18px 20px;
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      transition: background .35s, border-color .35s;
    }

    #choicesWrap {
      transition: opacity .28s ease, transform .28s ease;
    }
    #choicesWrap.fading {
      opacity: 0 !important;
      transform: translateY(8px) !important;
      pointer-events: none;
    }

    /* ── Vertical choice list */
    .choices-list { display: flex; flex-direction: column; gap: 9px; }
    .choices-scale { display: flex; gap: 8px; justify-content: center; }

    /* ── Choice button base */
    .choice-btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px 15px 18px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text);
      font-size: 14px; font-weight: 400;
      text-align: left;
      transition:
        border-color .2s,
        background .25s,
        color .25s,
        transform .3s cubic-bezier(.34,1.56,.64,1),
        box-shadow .25s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* left accent bar — micro-interaction */
    .choice-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--c-accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
      border-radius: 0 2px 2px 0;
      flex-shrink: 0;
    }
    .choice-btn:hover .choice-bar { transform: scaleY(1); }
    .choice-btn.selected .choice-bar { transform: scaleY(1); background: rgba(255,255,255,.35); }

    .choice-emoji { font-size: 21px; line-height: 1; flex-shrink: 0; }
    .choice-text  { flex: 1; line-height: 1.4; }

    /* check icon */
    .choice-check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: grid; place-items: center;
      font-size: 12px; font-weight: 700;
      color: #fff;
      opacity: 0;
      transform: scale(0) rotate(-90deg);
      transition: opacity .22s, transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .choice-btn.selected .choice-check {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* hover state */
    .choice-btn:not(:disabled):hover {
      border-color: var(--c-accent);
      transform: translateX(4px);
    }

    /* selected state */
    .choice-btn.selected {
      background: var(--c-accent);
      border-color: var(--c-accent);
      color: #fff;
      transform: translateX(5px);
      box-shadow: 0 4px 20px rgba(232,93,117,.35);
    }
    .choice-btn:disabled { cursor: default; }

    /* ── Scale choices (horizontal) */
    .choices-scale .choice-btn {
      flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 7px; padding: 14px 8px;
      font-size: 12px; text-align: center;
    }
    .choices-scale .choice-btn:hover  { transform: translateY(-3px); }
    .choices-scale .choice-btn.selected { transform: translateY(-4px) scale(1.05); }
    .choices-scale .choice-bar,
    .choices-scale .choice-check { display: none; }

    /* ═══════════════════════════════════════════════
       LOADING SCREEN
    ═══════════════════════════════════════════════ */
    #loadingScreen {
      align-items: center; justify-content: center;
      text-align: center; gap: 28px;
    }
    .loading-spinner {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 3px solid var(--c-border);
      border-top-color: var(--c-accent);
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 20px; letter-spacing: -.3px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-dots span {
      display: inline-block;
      animation: dotBounce .8s ease-in-out infinite;
      font-size: 22px; color: var(--c-accent);
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .30s; }

    /* ═══════════════════════════════════════════════
       RESULT SCREEN
    ═══════════════════════════════════════════════ */
    #resultScreen {
      align-items: center;
      padding: 80px 20px 64px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }

    .result-kicker {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--c-accent); margin-bottom: 20px;
      opacity: 0; animation: fadeIn .5s .1s ease both;
    }

    .result-type {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 33px; letter-spacing: -.5px;
      margin-bottom: 22px; min-height: 1.3em; text-align: center;
      opacity: 0; animation: fadeIn .5s .5s ease both;
    }
    .result-divider {
      width: 36px; height: 2px;
      background: var(--c-border); border-radius: 2px;
      margin: 0 auto 22px;
      opacity: 0; animation: fadeIn .5s .7s ease both;
    }
    .result-desc {
      font-size: 14px; font-weight: 300; color: var(--c-muted);
      line-height: 1.85; text-align: center; max-width: 320px;
      margin-bottom: 40px;
      opacity: 0; animation: fadeIn .6s 1.9s ease both;
    }

    /* ── Result share card preview */
    .share-card-preview {
      width: 100%; max-width: 320px;
      margin-bottom: 28px;
      opacity: 0; animation: fadeIn .6s .15s ease both;
    }
    .share-thumb-placeholder {
      width: 100%; aspect-ratio: 340/480;
      border-radius: 28px;
      background: var(--c-surf2);
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Action buttons */
    .action-btns {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 320px;
      opacity: 0; animation: slideUp .5s 2.2s ease both;
    }
    .action-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 16px 20px;
      border-radius: var(--r-sm);
      font-size: 15px; font-weight: 500;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      text-decoration: none;
    }
    .action-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .btn-save  { background: var(--c-surf2); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-kakao { background: #FEE500; color: #1c1917; }
    .btn-copy  { background: var(--c-surface); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-share { background: var(--c-surface); color: var(--c-text); border: 1.5px solid var(--c-border); }
    .btn-more  { background: var(--c-main); color: var(--c-bg); }
    .btn-icon  { font-size: 19px; }

    /* ── Dimension Analysis ────────────────────────── */
    .dim-analysis {
      width: 100%; max-width: 480px;
      margin-top: 40px; margin-bottom: 16px;
      opacity: 0; animation: slideUp .6s 2.3s ease both;
    }
    .dim-analysis-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 17px; letter-spacing: -.3px;
      text-align: center; margin-bottom: 24px;
    }
    .dim-model-group {
      margin-bottom: 24px;
    }
    .dim-model-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.8px;
      color: var(--c-accent); text-transform: uppercase;
      margin-bottom: 10px; padding-left: 4px;
    }
    .dim-item {
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: background .35s, border-color .35s;
    }
    .dim-item-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .dim-item-emoji { font-size: 16px; flex-shrink: 0; }
    .dim-item-label {
      font-size: 11px; font-weight: 500; color: var(--c-muted);
      flex: 1;
    }
    .dim-item-level {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 3px 9px; border-radius: 100px;
    }
    .dim-level-L { background: rgba(100,149,237,.15); color: #5b86d4; }
    .dim-level-M { background: rgba(255,193,7,.15);   color: #c8920a; }
    .dim-level-H { background: rgba(46,204,113,.15);  color: #27a85e; }
    .dim-item-title {
      font-size: 13px; font-weight: 500;
      margin-bottom: 4px;
    }
    .dim-item-desc {
      font-size: 12px; font-weight: 300; color: var(--c-muted);
      line-height: 1.7;
    }

    /* AdSense */
    .result-ad {
      width: 100%; max-width: 340px; height: 80px;
      border: 1.5px dashed var(--c-border); background: var(--c-surf2);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; letter-spacing: 1.2px;
      color: var(--c-muted); margin-top: 40px;
      opacity: 0; animation: fadeIn .5s 2.4s ease both;
    }

    /* ═══════════════════════════════════════════════
       INSTAGRAM-STYLE SHARE CARD
       Positioned off-screen; captured by html2canvas
    ═══════════════════════════════════════════════ */
    #shareCard {
      position: fixed;
      left: -9999px; top: 0;
      width: 340px; height: 480px;
      background: #1c1917;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 20px;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .sc-blobs { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .sc-blob {
      position: absolute; border-radius: 50%;
    }
    .sc-blob-1 { width: 220px; height: 220px; top: -80px; right: -70px; background: #e85d75; opacity: .18; }
    .sc-blob-2 { width: 160px; height: 160px; bottom: -60px; left: -40px; background: #e85d75; opacity: .10; }
    .sc-blob-3 { width: 80px;  height: 80px;  top: 40%;    left: -20px; background: #ff9a3c; opacity: .12; }
    .sc-inner {
      position: relative; flex: 1;
      display: flex; flex-direction: column;
      gap: 14px;
    }
    .sc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sc-logo {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 17px; color: #faf8f5;
      letter-spacing: -1px;
    }
    .sc-logo-dot { color: #e85d75; }
    .sc-center {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 10px;
    }
    .sc-tag {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: #e85d75;
      background: rgba(232,93,117,.14);
      padding: 5px 12px; border-radius: 100px;
    }
    .sc-emoji { font-size: 72px; line-height: 1; }
    .sc-thumb-img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }
    .sc-label {
      font-size: 11px; font-weight: 500;
      color: rgba(250,248,245,.45); letter-spacing: .3px;
    }
    .sc-type {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 26px; color: #faf8f5;
      letter-spacing: -.5px; line-height: 1.2;
    }
    .sc-divider {
      width: 30px; height: 1.5px;
      background: rgba(250,248,245,.18);
      margin: 0 auto 14px;
    }
    .sc-desc {
      font-size: 11.5px; color: rgba(250,248,245,.5);
      line-height: 1.7; font-weight: 300;
      max-width: 240px;
    }
    .sc-footer {
      position: relative;
      font-size: 10px; color: rgba(250,248,245,.25);
      font-weight: 500; letter-spacing: .5px;
      text-align: center;
    }

    /* thumbnail shown in result page */
    #shareThumb {
      width: 100%; border-radius: 16px;
      box-shadow: var(--shadow-hover);
      display: block;
    }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--c-main); color: var(--c-bg);
      font-size: 13px; font-weight: 500;

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let testData = null, testId = '', qIndex = 0, scores = {}, locked = false;
let answersRaw = []; // For SBTI scoring logic

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
(function init() {
  setTheme(
    localStorage.getItem('theme') ??
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
  );

  const params = new URLSearchParams(location.search);
  testId   = params.get('id') || '';
  
  if (testId === 'sbti' && typeof KBTI_QUESTIONS !== 'undefined') {
    testData = {
      title: "SBTI 성격 유형 테스트",
      emoji: "💜",
      thumb: "images/sbti/thumb.webp",
      subtitle: "나의 숨겨진 본능은? (30문항)",
      questions: KBTI_QUESTIONS.map(q => ({
        q: q.question,
        choices: q.choices.map(c => ({
          text: c.text,
          emoji: c.label === 'L' ? '😐' : c.label === 'M' ? '🙂' : '😎',
          score: c.score // raw score 1~3
        }))
      })),
      results: KBTI_TYPES // Will be handled specifically in showResult
    };
  } else {
    testData = tests[testId];
  }

  if (!testData) {
    document.getElementById('notFound').classList.add('active');
    return;
  }

  // Update meta tags & JSON-LD
  updateSEO();

  // Fill intro
  document.title = `마음. — ${testData.title}`;
  const introEmojiEl = document.getElementById('introEmoji');
  if (testData.thumb) {
    const img = document.createElement('img');
    img.src = testData.thumb;
    img.alt = testData.title;
    img.className = 'intro-thumb';
    introEmojiEl.replaceWith(img);
  } else {
    introEmojiEl.textContent = testData.emoji;
  }
  document.getElementById('introTitle').textContent  = testData.title;
  document.getElementById('introSub').textContent    = testData.subtitle;
  document.getElementById('introQCount').textContent = `${testData.questions.length}문항`;

  // Events
  document.getElementById('startBtn').addEventListener('click', startQuiz);
  document.getElementById('introShareBtn').addEventListener('click', shareIntro);
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  document.getElementById('btnKakao').addEventListener('click', shareKakao);
  document.getElementById('btnCopy').addEventListener('click', copyLink);
  document.getElementById('btnShare').addEventListener('click', shareNative);
  document.getElementById('btnSave').addEventListener('click', saveImage);

  Object.keys(testData.results).forEach(k => { scores[k] = 0; });
})();

/* ══════════════════════════════════════════════════
   SEO
══════════════════════════════════════════════════ */
function updateSEO() {
  const title = `${testData.title} — 마음.`;
  const desc  = testData.subtitle;
  const url   = location.href;

  document.title = title;
  document.getElementById('ogTitle').content  = title;
  document.getElementById('ogDesc').content   = desc;
  document.getElementById('ogUrl').content    = url;
  document.getElementById('canonical').href   = url;
  document.querySelector('meta[name="description"]')?.setAttribute('content', desc);

  document.getElementById('jsonld').textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Quiz",
    "name": testData.title,
    "description": desc,
    "url": url,
    "author": { "@type": "Organization", "name": "마음." },
    "numberOfQuestions": testData.questions.length,
  });
}

/* ══════════════════════════════════════════════════
   THEME
══════════════════════════════════════════════════ */
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', t);
}
function toggleTheme() {
  setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
}

/* ══════════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════════ */
function startQuiz() {
  qIndex = 0;
  showScreen('quizScreen');
  renderQuestion(true);
}

function renderQuestion(first) {
  const total   = testData.questions.length;
  const current = testData.questions[qIndex];

  // Progress + counter
  document.getElementById('progressFill').style.width = `${(qIndex / total) * 100}%`;
  const counterText = `Q${qIndex + 1}  ·  ${total}문항 중`;
  document.getElementById('qCounter').textContent    = counterText;
  const navCounter = document.getElementById('qCounterNav');
  navCounter.textContent = counterText;
  navCounter.classList.add('visible');

  // ── Question text (slide animation) ──────────────
  const wrap = document.getElementById('slideWrap');
  const slide = document.createElement('div');
  slide.className = first ? 'q-slide' : 'q-slide enter-right';
  slide.innerHTML = `
    <div class="q-text">${current.q}</div>
    ${current.img ? `<img class="q-img" src="${current.img}" alt="" />` : ''}
  `;

  const oldSlide = wrap.querySelector('.q-slide');
  if (oldSlide) {
    oldSlide.classList.add('exit-left');
    oldSlide.addEventListener('animationend', () => oldSlide.remove(), { once: true });
  }
  wrap.appendChild(slide);

  // ── Choices (fade transition) ─────────────────────
  const cw = document.getElementById('choicesWrap');

  const renderNow = () => {
    renderChoices(current, cw);
    cw.style.transition = 'none';
    cw.style.opacity    = '0';
    cw.style.transform  = 'translateY(10px)';
    requestAnimationFrame(() => {
      cw.style.transition = 'opacity .3s ease, transform .3s ease';
      cw.style.opacity    = '1';
      cw.style.transform  = 'translateY(0)';
    });
  };

  if (first) {
    renderNow();
  } else {
    cw.style.opacity   = '0';
    cw.style.transform = 'translateY(10px)';
    setTimeout(renderNow, 180);
  }
}

function renderChoices(current, container) {
  const isScale = !!current.scale;
  container.innerHTML = `
    <div class="${isScale ? 'choices-scale' : 'choices-list'}">
      ${current.choices.map((c, i) => `
        <button class="choice-btn" data-idx="${i}">
          <span class="choice-bar"></span>
          <span class="choice-emoji">${c.emoji}</span>
          <span class="choice-text">${c.text}</span>
          <span class="choice-check">✓</span>
        </button>
      `).join('')}
    </div>
  `;

  container.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (locked) return;
      locked = true;

      container.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add('selected');

      // Accumulate scores
      const choice = current.choices[+btn.dataset.idx];
      if (testId === 'sbti') {
        answersRaw.push(choice.score);
      } else {
        Object.entries(choice.score).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
      }

      setTimeout(() => {
        locked = false;
        qIndex++;
        if (qIndex < testData.questions.length) {
          renderQuestion(false);
        } else {
          showLoading();
        }
      }, 340);
    });
  });
}

/* ══════════════════════════════════════════════════
   LOADING → RESULT
══════════════════════════════════════════════════ */
function showLoading() {
  document.getElementById('progressFill').style.width = '100%';
  showScreen('loadingScreen');
  setTimeout(showResult, 1700);
}

function showResult() {
  let winner, res;

  if (testId === 'sbti') {
    const pattern = calcDimensions(answersRaw);
    const match   = matchType(pattern, KBTI_TYPE_PATTERNS);
    winner = match.type;
    const typeData = KBTI_TYPES[winner];
    res = {
      type: typeData.name,
      emoji: typeData.emoji,
      desc: typeData.desc,
      tagline: typeData.tagline
    };

    if (typeof getDimensionAnalysis !== 'undefined') {
      const analysis = getDimensionAnalysis(pattern);
      renderDimAnalysis(analysis);
    }
  } else {
    winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    res    = testData.results[winner];
  }

  // Populate result screen
  document.getElementById('resultDesc').textContent = res.desc;

  // Populate share card (off-screen)
  const shortDesc = res.desc.length > 55 ? res.desc.slice(0, 55) + '…' : res.desc;
  document.getElementById('scTag').textContent  = testData.title;
  document.getElementById('scType').textContent = res.type;
  document.getElementById('scDesc').textContent = shortDesc;
  const scThumbImg = document.getElementById('scThumbImg');
  const scEmoji    = document.getElementById('scEmoji');
  if (testId === 'sbti') {
    scThumbImg.src = `images/sbti/${winner}.webp`;
    scThumbImg.style.display = 'block';
    scEmoji.style.display    = 'none';
  } else if (testData.thumb) {
    scThumbImg.src = testData.thumb;
    scThumbImg.style.display = 'block';
    scEmoji.style.display    = 'none';
  } else {
    scEmoji.textContent      = res.emoji;
    scEmoji.style.display    = 'block';
    scThumbImg.style.display = 'none';
  }

  showScreen('resultScreen');

  // Typing effect for type name
  const typeEl = document.getElementById('resultType');
  typeEl.textContent = '';
  const chars = res.type.split('');
  setTimeout(() => {
    let i = 0;
    const iv = setInterval(() => {
      typeEl.textContent += chars[i++];
      if (i >= chars.length) clearInterval(iv);
    }, 75);
  }, 400);

  // Generate thumbnail early
  setTimeout(generateThumb, 800);

  sessionStorage.setItem('resultType',  res.type);
  sessionStorage.setItem('resultEmoji', res.emoji);
  sessionStorage.setItem('resultCode',  winner);
}

/* ══════════════════════════════════════════════════
   SHARE CARD IMAGE (html2canvas)
══════════════════════════════════════════════════ */
async function generateThumb() {
  if (typeof html2canvas === 'undefined') return;
  try {
    const canvas = await html2canvas(document.getElementById('shareCard'), {
      scale: 1.5,
      useCORS: true,
      backgroundColor: null,
      logging: false,
    });
    const thumb = document.getElementById('shareThumb');
    thumb.src   = canvas.toDataURL('image/png');
    thumb.style.display = 'block';
    document.getElementById('shareThumbPlaceholder').style.display = 'none';
  } catch (_) { /* silently skip if unavailable */ }
}

async function saveImage() {
  const btn = document.getElementById('btnSave');
  btn.textContent = '⏳ 생성 중...';
  btn.disabled    = true;

  try {
    if (typeof html2canvas === 'undefined') throw new Error('html2canvas not loaded');

    const canvas = await html2canvas(document.getElementById('shareCard'), {
      scale: 2,
      useCORS: true,
      backgroundColor: null,
      logging: false,
    });

    const code     = sessionStorage.getItem('resultCode') || testData.title;
    const filename = testId === 'sbti' ? `SBTI_${code}.webp` : `마음_${testData.title}_결과.webp`;
    const link     = document.createElement('a');
    link.download  = filename;
    link.href      = canvas.toDataURL('image/webp', 0.92);
    link.click();

    showToast('이미지가 저장됐어요 📸');
  } catch (_) {
    showToast('저장에 실패했어요. 다시 시도해주세요.');
  } finally {
    btn.innerHTML = '<span class="btn-icon">💾</span> 결과 이미지 저장';
    btn.disabled  = false;
  }
}

/* ══════════════════════════════════════════════════
   KAKAO / COPY
══════════════════════════════════════════════════ */
function initKakao() {
  if (typeof Kakao === 'undefined') return false;
  if (!Kakao.isInitialized()) Kakao.init('bbe63bfcba108e48b558a6554e0fd9c1');
  return true;
}

function shareIntro() {
  if (!initKakao()) { showToast('카카오 SDK를 불러오는 중이에요.'); return; }
  const base    = 'https://psychological-test-mu.vercel.app';
  const testUrl = `${base}/test.html?id=${testId}`;
  const imageUrl = testData.thumb
    ? `${base}/${testData.thumb}`
    : `${base}/images/sbti/thumb.webp`;

  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: `${testData.emoji} ${testData.title}`,
      description: testData.subtitle,
      imageUrl,
      link: { mobileWebUrl: testUrl, webUrl: testUrl },
    },
    buttons: [
      { title: '테스트하기', link: { mobileWebUrl: testUrl, webUrl: testUrl } },
      { title: '다른 테스트 보기', link: { mobileWebUrl: `${base}/`, webUrl: `${base}/` } },
    ],
  });
}

function shareKakao() {
  if (!initKakao()) { showToast('카카오 SDK를 불러오는 중이에요.'); return; }

  const type  = sessionStorage.getItem('resultType')  || '';
  const emoji = sessionStorage.getItem('resultEmoji') || '';
  const code  = sessionStorage.getItem('resultCode')  || '';
  const base  = 'https://psychological-test-mu.vercel.app';
  const url   = location.href;
  const testUrl = `${base}/test.html?id=${testId}`;
  const imageUrl = (testId === 'sbti' && code)
    ? `${base}/images/sbti/${code}.webp`
    : `${base}/images/${testId}/thumb.webp`;

  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: `${testData.emoji} ${testData.title}`,
      description: `${testData.subtitle} — 나는 어떤 유형일까?`,
      imageUrl,
      link: { mobileWebUrl: url, webUrl: url },
    },
    buttons: [
      { title: '테스트하기',    link: { mobileWebUrl: testUrl,       webUrl: testUrl       } },
      { title: '다른 테스트 보기', link: { mobileWebUrl: `${base}/`, webUrl: `${base}/` } },
    ],
  });
}

async function shareNative() {
  const type = sessionStorage.getItem('resultType') || '';
  const text = `${testData.emoji} ${testData.title}${type ? ` — ${type}` : ''}`;
  const url  = location.href;

  if (navigator.share) {
    try {
      await navigator.share({ title: text, url });
    } catch (_) {}
    return;
  }

  // 폴백: X / Threads 선택 토스트 대신 X로 바로 열기
  const encoded = encodeURIComponent(`${text}\n${url}`);
  window.open(`https://x.com/intent/post?text=${encoded}`, '_blank');
}

function copyLink() {
  const doToast = () => showToast('링크가 복사됐어요 🎉');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(location.href).then(doToast).catch(fallback);
  } else {
    fallback();
  }

  function fallback() {
    const ta = Object.assign(document.createElement('textarea'), { value: location.href });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    doToast();
  }
}

/* ══════════════════════════════════════════════════
   DIMENSION ANALYSIS RENDER
══════════════════════════════════════════════════ */
function renderDimAnalysis(analysis) {
  const container = document.getElementById('dimAnalysisContent');
  const levelLabel = { L: '낮음', M: '보통', H: '높음' };

  container.innerHTML = Object.entries(analysis).map(([modelName, dims]) => `
    <div class="dim-model-group">
      <div class="dim-model-label">${modelName}</div>
      ${dims.map(d => `
        <div class="dim-item">
          <div class="dim-item-header">
            <span class="dim-item-emoji">${d.emoji}</span>
            <span class="dim-item-label">${d.label}</span>
            <span class="dim-item-level dim-level-${d.level}">${levelLabel[d.level]}</span>
          </div>
          <div class="dim-item-title">${d.title}</div>
          <div class="dim-item-desc">${d.desc}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  document.getElementById('dimAnalysis').style.display = 'block';
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
